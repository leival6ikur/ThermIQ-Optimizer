# Mosquitto Configuration for ThermIQ Heat Pump Optimizer
# Development configuration (macOS)

# Network Settings
listener 1883
allow_anonymous true

# Logging (for development)
log_dest file /opt/homebrew/var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Persistence
persistence true
persistence_location /opt/homebrew/var/lib/mosquitto/

# Connection settings
max_keepalive 60
max_queued_messages 1000

# Note: For production deployment, enable authentication:
# allow_anonymous false
# password_file /path/to/password_file
